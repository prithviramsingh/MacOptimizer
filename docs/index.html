<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>MacOptimizer</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<meta name="description" content="A native macOS app that monitors processes, cleans system caches, manages startup items, and gives smart suggestions — now as an interactive demo."/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root {
    --paper:        #F4EFE7;
    --surface:      #FBF8F2;
    --surface-deep: #EEE8DD;
    --sidebar:      #EDE7DB;
    --ink:          #1A1A1C;
    --ink-5:  rgba(26,26,28,0.04);
    --ink-8:  rgba(26,26,28,0.08);
    --ink-10: rgba(26,26,28,0.10);
    --ink-15: rgba(26,26,28,0.15);
    --ink-20: rgba(26,26,28,0.20);
    --ink-30: rgba(26,26,28,0.30);
    --ink-40: rgba(26,26,28,0.40);
    --ink-50: rgba(26,26,28,0.50);
    --ink-60: rgba(26,26,28,0.60);
    --ink-70: rgba(26,26,28,0.74);

    --accent:        oklch(62% 0.17 35);
    --accent-strong: oklch(48% 0.17 35);
    --accent-5:      oklch(96% 0.03 35);
    --accent-10:     oklch(92% 0.06 35);
    --accent-20:     oklch(85% 0.10 35);

    --good:        oklch(55% 0.09 150);
    --good-strong: oklch(40% 0.09 150);
    --good-10:     oklch(92% 0.04 150);
    --good-20:     oklch(85% 0.07 150);

    --font-hero: "Instrument Serif", Georgia, serif;
    --font-ui:   "Inter", system-ui, -apple-system, sans-serif;
    --font-mono: "JetBrains Mono", ui-monospace, monospace;
  }
  html, body, #root { margin: 0; height: 100%; }
  body {
    background: #ddd6c7;
    color: var(--ink);
    font-family: var(--font-ui);
    -webkit-font-smoothing: antialiased;
    font-feature-settings: "cv11", "ss01";
  }
  * { box-sizing: border-box; }

  /* custom scrollbars */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--ink-15); border-radius: 10px; border: 2px solid var(--paper); }
  ::-webkit-scrollbar-thumb:hover { background: var(--ink-30); }
  ::-webkit-scrollbar-track { background: transparent; }

  button { font-family: inherit; }
  input { font-family: inherit; }
  em { font-style: italic; }

  /* subtle textured paper */
  body::before {
    content: '';
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image:
      radial-gradient(ellipse at top left, oklch(75% 0.04 60 / 0.25), transparent 60%),
      radial-gradient(ellipse at bottom right, oklch(70% 0.06 40 / 0.15), transparent 55%);
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="data.js"></script>
  <script type="text/babel" src="macos-window.jsx"></script>
  <script type="text/babel" src="ui-primitives.jsx"></script>
  <script type="text/babel" src="views-dashboard-processes.jsx"></script>
  <script type="text/babel" src="views-cleanup-startup-suggestions.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
