name: Build and Distribute

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14
    permissions:
      contents: write
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Swift
      uses: swift-actions/setup-swift@v2
      with:
        swift-version: "5.9"

    - name: Check for Signing Secrets
      id: check_secrets
      run: |
        if [ -n "${{ secrets.MACOS_CERTIFICATE }}" ] && \
           [ -n "${{ secrets.MACOS_CERTIFICATE_PWD }}" ] && \
           [ -n "${{ secrets.APPLE_ID }}" ] && \
           [ -n "${{ secrets.TEAM_ID }}" ] && \
           [ -n "${{ secrets.APP_PASSWORD }}" ]; then
          echo "HAS_SECRETS=true" >> $GITHUB_ENV
          echo "Signing secrets found."
        else
          echo "HAS_SECRETS=false" >> $GITHUB_ENV
          echo "Signing secrets missing. Build will proceed without signing."
        fi

    - name: Extract Version
      run: |
        if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
          echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV
        else
          echo "VERSION=1.0.4" >> $GITHUB_ENV
        fi

    - name: Import Apple Certificates
      if: env.HAS_SECRETS == 'true' && startsWith(github.ref, 'refs/tags/v')
      uses: apple-actions/import-codesign-certs@v3
      with:
        p12-file-base64: ${{ secrets.MACOS_CERTIFICATE }}
        p12-password: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        keychain-password: ${{ secrets.MACOS_CERTIFICATE_PWD }}

    - name: Build Release
      run: swift build -c release

    - name: Assemble App Bundle
      run: |
        APP_NAME="MacOptimizer"
        BUNDLE_ID="com.prithvibondili.macoptimizer"
        BUILD_DIR=".build/distribution"
        APP_BUNDLE="$BUILD_DIR/$APP_NAME.app"
        BINARY=".build/release/$APP_NAME"
        
        mkdir -p "$APP_BUNDLE/Contents/MacOS"
        mkdir -p "$APP_BUNDLE/Contents/Resources"
        cp "$BINARY" "$APP_BUNDLE/Contents/MacOS/$APP_NAME"
        
        cat > "$APP_BUNDLE/Contents/Info.plist" <<PLIST
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleExecutable</key>
            <string>$APP_NAME</string>
            <key>CFBundleIdentifier</key>
            <string>$BUNDLE_ID</string>
            <key>CFBundleName</key>
            <string>Mac Optimizer</string>
            <key>CFBundleDisplayName</key>
            <string>Mac Optimizer</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>${{ env.VERSION }}</string>
            <key>CFBundleVersion</key>
            <string>${{ github.run_number }}</string>
            <key>LSMinimumSystemVersion</key>
            <string>13.0</string>
            <key>NSHighResolutionCapable</key>
            <true/>
            <key>NSPrincipalClass</key>
            <string>NSApplication</string>
            <key>NSHumanReadableCopyright</key>
            <string>Copyright © 2026. All rights reserved.</string>
        </dict>
        </plist>
        PLIST

    - name: Code Sign and Notarize
      if: env.HAS_SECRETS == 'true' && startsWith(github.ref, 'refs/tags/v')
      env:
        APPLE_ID: ${{ secrets.APPLE_ID }}
        TEAM_ID: ${{ secrets.TEAM_ID }}
        APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
      run: |
        APP_NAME="MacOptimizer"
        BUILD_DIR=".build/distribution"
        APP_BUNDLE="$BUILD_DIR/$APP_NAME.app"
        ENTITLEMENTS="MacOptimizer.entitlements"
        
        echo "Signing App Bundle..."
        codesign --force --deep --options runtime --entitlements "$ENTITLEMENTS" --sign "Developer ID Application" --timestamp "$APP_BUNDLE"
        
        echo "Creating Archive for Notarization..."
        ZIP_PATH="$BUILD_DIR/$APP_NAME.zip"
        ditto -c -k --keepParent "$APP_BUNDLE" "$ZIP_PATH"
        
        echo "Submitting to Notarization Service..."
        xcrun notarytool submit "$ZIP_PATH" --apple-id "$APPLE_ID" --team-id "$TEAM_ID" --password "$APP_PASSWORD" --wait
        
        echo "Stapling Ticket..."
        xcrun stapler staple "$APP_BUNDLE"

    - name: Create DMG
      run: |
        APP_NAME="MacOptimizer"
        BUILD_DIR=".build/distribution"
        APP_BUNDLE="$BUILD_DIR/$APP_NAME.app"
        DMG_NAME="$APP_NAME-${{ env.VERSION }}.dmg"
        
        # Staging for DMG
        mkdir -p .build/dmg_staging
        cp -R "$APP_BUNDLE" .build/dmg_staging/
        ln -s /Applications .build/dmg_staging/Applications
        
        hdiutil create -volname "$APP_NAME" -srcfolder .build/dmg_staging -ov -format UDZO ".build/$DMG_NAME"
        
        if [[ "${{ env.HAS_SECRETS }}" == "true" ]] && [[ "${{ github.ref }}" == refs/tags/v* ]]; then
          echo "Signing DMG..."
          codesign --force --sign "Developer ID Application" --timestamp ".build/$DMG_NAME"
        fi
        
        echo "DMG_PATH=.build/$DMG_NAME" >> $GITHUB_ENV

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MacOptimizer-DMG
        path: ${{ env.DMG_PATH }}

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ env.DMG_PATH }}
        generate_release_notes: true
        fail_on_unmatched_files: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Trigger Tap Update
      if: startsWith(github.ref, 'refs/tags/v')
      run: |
        curl -X POST -H "Authorization: token ${{ secrets.TAP_GITHUB_TOKEN }}" \
        -H "Accept: application/vnd.github.v3+json" \
        https://api.github.com/repos/prithviramsingh/homebrew-tap/dispatches \
        -d '{"event_type":"update_cask"}'
